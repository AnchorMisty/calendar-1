<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pastel Calendar Notes</title>
<style>
  :root {
    --bg: #eef6fb;
    --panel: #f8fcff;
    --panel-2: #e3f0f7;
    --blue: #9fc8df;
    --blue-dark: #5f8da8;
    --text: #344957;
    --muted: #7d96a6;
    --accent: #b9dff0;
    --accent-2: #d7edf7;
    --white: #ffffff;
    --shadow: rgba(95, 141, 168, 0.18);
    --danger: #d99a9a;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    background:
      radial-gradient(circle at 15% 15%, #ffffff 0, transparent 26%),
      radial-gradient(circle at 85% 10%, #dceff8 0, transparent 24%),
      linear-gradient(135deg, #eef6fb, #f8fbff);
    color: var(--text);
  }

  .app {
    width: min(1180px, calc(100vw - 32px));
    min-height: calc(100vh - 32px);
    margin: 16px auto;
    display: grid;
    grid-template-columns: 1.05fr 0.95fr;
    gap: 18px;
  }

  .panel {
    background: rgba(248, 252, 255, 0.86);
    border: 1px solid rgba(159, 200, 223, 0.42);
    border-radius: 28px;
    box-shadow: 0 18px 45px var(--shadow);
    backdrop-filter: blur(12px);
    padding: 22px;
  }

  .left {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .title-wrap h1 {
    margin: 0;
    font-size: 25px;
    letter-spacing: 0.04em;
    color: var(--blue-dark);
  }

  .subtitle {
    margin-top: 5px;
    color: var(--muted);
    font-size: 13px;
  }

  .nav {
    display: flex;
    gap: 8px;
  }

  button {
    border: 0;
    border-radius: 999px;
    background: var(--accent-2);
    color: var(--blue-dark);
    padding: 9px 13px;
    cursor: pointer;
    font-weight: 700;
    box-shadow: inset 0 0 0 1px rgba(95, 141, 168, 0.12);
    transition: transform 0.15s ease, background 0.15s ease;
  }

  button:hover {
    transform: translateY(-1px);
    background: var(--accent);
  }

  .month-title {
    margin: 0;
    padding: 12px 16px;
    background: var(--panel-2);
    color: var(--blue-dark);
    border-radius: 18px;
    text-align: center;
    font-size: 20px;
  }

  .weekdays,
  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }

  .weekday {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 2px 0;
  }

  .day {
    min-height: 82px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.78);
    border: 1px solid rgba(159, 200, 223, 0.38);
    padding: 9px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s ease, border 0.15s ease, background 0.15s ease;
  }

  .day:hover {
    transform: translateY(-2px);
    border-color: rgba(95, 141, 168, 0.52);
    background: #ffffff;
  }

  .empty {
    opacity: 0.35;
    cursor: default;
  }

  .day.selected {
    background: #e0f2fb;
    border-color: var(--blue-dark);
  }

  .day.today::after {
    content: "today";
    position: absolute;
    right: 8px;
    top: 8px;
    font-size: 10px;
    color: var(--blue-dark);
    background: #ffffffa8;
    padding: 2px 6px;
    border-radius: 999px;
  }

  .date {
    font-size: 14px;
    font-weight: 800;
    color: var(--blue-dark);
  }

  .note-preview {
    margin-top: 7px;
    font-size: 12px;
    line-height: 1.35;
    color: var(--muted);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    white-space: pre-wrap;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--blue-dark);
    position: absolute;
    left: 10px;
    bottom: 10px;
    opacity: 0.72;
  }

  .right {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .editor-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .selected-date {
    margin: 0;
    font-size: 24px;
    color: var(--blue-dark);
  }

  .hint {
    margin-top: 6px;
    color: var(--muted);
    font-size: 13px;
  }

  textarea {
    flex: 1;
    min-height: 470px;
    width: 100%;
    border: 1px solid rgba(159, 200, 223, 0.55);
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.7);
    color: var(--text);
    padding: 18px;
    font-size: 15px;
    line-height: 1.75;
    resize: none;
    outline: none;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.55);
  }

  textarea:focus {
    border-color: var(--blue-dark);
    background: #ffffff;
  }

  .tools {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .status {
    color: var(--muted);
    font-size: 13px;
  }

  .danger {
    color: #945f5f;
    background: #f5dddd;
  }

  .danger:hover {
    background: #edc7c7;
  }

  @media (max-width: 860px) {
    .app {
      grid-template-columns: 1fr;
    }

    textarea {
      min-height: 300px;
    }
  }
</style>
</head>
<body>
  <main class="app">
    <section class="panel left">
      <div class="header">
        <div class="title-wrap">
          <h1>Calendar Notes</h1>
          <div class="subtitle">点击日期编辑右侧备忘</div>
        </div>
        <div class="nav">
          <button id="prevBtn">←</button>
          <button id="todayBtn">今天</button>
          <button id="nextBtn">→</button>
        </div>
      </div>

      <h2 class="month-title" id="monthTitle"></h2>
      <div class="weekdays" id="weekdays"></div>
      <div class="calendar" id="calendar"></div>
    </section>

    <section class="panel right">
      <div class="editor-header">
        <div>
          <h2 class="selected-date" id="selectedDateTitle"></h2>
          <div class="hint">内容会自动保存在当前浏览器里。</div>
        </div>
      </div>

      <textarea id="noteEditor" placeholder="今天要记什么呢？"></textarea>

      <div class="tools">
        <span class="status" id="saveStatus">已准备好</span>
        <div>
          <button id="exportBtn">导出 JSON</button>
          <button id="importBtn">导入 JSON</button>
          <button class="danger" id="clearBtn">清空当天</button>
        </div>
      </div>
      <input type="file" id="fileInput" accept="application/json" hidden />
    </section>
  </main>

<script>
  const STORAGE_PREFIX = "pastel-calendar-note-";

  const monthTitle = document.getElementById("monthTitle");
  const weekdays = document.getElementById("weekdays");
  const calendar = document.getElementById("calendar");
  const selectedDateTitle = document.getElementById("selectedDateTitle");
  const noteEditor = document.getElementById("noteEditor");
  const saveStatus = document.getElementById("saveStatus");
  const fileInput = document.getElementById("fileInput");

  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const todayBtn = document.getElementById("todayBtn");
  const clearBtn = document.getElementById("clearBtn");
  const exportBtn = document.getElementById("exportBtn");
  const importBtn = document.getElementById("importBtn");

  const weekNames = ["日", "一", "二", "三", "四", "五", "六"];
  const now = new Date();
  let current = new Date(now.getFullYear(), now.getMonth(), 1);
  let selectedKey = makeDateKey(now.getFullYear(), now.getMonth(), now.getDate());
  let saveTimer = null;

  weekNames.forEach(name => {
    const div = document.createElement("div");
    div.className = "weekday";
    div.textContent = name;
    weekdays.appendChild(div);
  });

  function makeDateKey(year, month, day) {
    return `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
  }

  function parseDateKey(key) {
    const [year, month, day] = key.split("-").map(Number);
    return { year, month: month - 1, day };
  }

  function getStorageKey(dateKey) {
    return STORAGE_PREFIX + dateKey;
  }

  function getNote(dateKey) {
    return localStorage.getItem(getStorageKey(dateKey)) || "";
  }

  function setNote(dateKey, text) {
    if (text.trim()) {
      localStorage.setItem(getStorageKey(dateKey), text);
    } else {
      localStorage.removeItem(getStorageKey(dateKey));
    }
  }

  function formatDateZh(key) {
    const { year, month, day } = parseDateKey(key);
    const date = new Date(year, month, day);
    const week = weekNames[date.getDay()];
    return `${year} 年 ${month + 1} 月 ${day} 日 · 星期${week}`;
  }

  function escapeHtml(text) {
    return text.replace(/[&<>"']/g, char => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[char]));
  }

  function renderCalendar() {
    calendar.innerHTML = "";

    const year = current.getFullYear();
    const month = current.getMonth();
    const firstDay = new Date(year, month, 1).getDay();
    const totalDays = new Date(year, month + 1, 0).getDate();
    const todayKey = makeDateKey(now.getFullYear(), now.getMonth(), now.getDate());

    monthTitle.textContent = `${year} 年 ${month + 1} 月`;

    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement("div");
      empty.className = "day empty";
      calendar.appendChild(empty);
    }

    for (let day = 1; day <= totalDays; day++) {
      const key = makeDateKey(year, month, day);
      const note = getNote(key);
      const div = document.createElement("div");
      div.className = "day";
      if (key === todayKey) div.classList.add("today");
      if (key === selectedKey) div.classList.add("selected");

      div.innerHTML = `
        <div class="date">${day}</div>
        <div class="note-preview">${note ? escapeHtml(note) : ""}</div>
        ${note ? '<div class="dot"></div>' : ''}
      `;

      div.addEventListener("click", () => selectDate(key));
      calendar.appendChild(div);
    }
  }

  function selectDate(key) {
    saveCurrentNote();
    selectedKey = key;
    selectedDateTitle.textContent = formatDateZh(key);
    noteEditor.value = getNote(key);
    saveStatus.textContent = "已切换日期";
    renderCalendar();
  }

  function saveCurrentNote() {
    setNote(selectedKey, noteEditor.value);
    saveStatus.textContent = "已自动保存";
    renderCalendar();
  }

  noteEditor.addEventListener("input", () => {
    saveStatus.textContent = "正在输入……";
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveCurrentNote, 350);
  });

  prevBtn.addEventListener("click", () => {
    saveCurrentNote();
    current.setMonth(current.getMonth() - 1);
    renderCalendar();
  });

  nextBtn.addEventListener("click", () => {
    saveCurrentNote();
    current.setMonth(current.getMonth() + 1);
    renderCalendar();
  });

  todayBtn.addEventListener("click", () => {
    saveCurrentNote();
    const today = new Date();
    current = new Date(today.getFullYear(), today.getMonth(), 1);
    selectDate(makeDateKey(today.getFullYear(), today.getMonth(), today.getDate()));
  });

  clearBtn.addEventListener("click", () => {
    if (!confirm("确定要清空当天备忘吗？")) return;
    noteEditor.value = "";
    saveCurrentNote();
  });

  exportBtn.addEventListener("click", () => {
    saveCurrentNote();
    const data = {};
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith(STORAGE_PREFIX)) {
        data[key.replace(STORAGE_PREFIX, "")] = localStorage.getItem(key);
      }
    }

    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "calendar-notes-backup.json";
    a.click();
    URL.revokeObjectURL(url);
    saveStatus.textContent = "已导出备份";
  });

  importBtn.addEventListener("click", () => fileInput.click());

  fileInput.addEventListener("change", async () => {
    const file = fileInput.files[0];
    if (!file) return;

    try {
      const text = await file.text();
      const data = JSON.parse(text);
      Object.entries(data).forEach(([dateKey, value]) => {
        if (/^\d{4}-\d{2}-\d{2}$/.test(dateKey)) {
          setNote(dateKey, String(value));
        }
      });
      selectDate(selectedKey);
      saveStatus.textContent = "导入成功";
    } catch (error) {
      alert("导入失败：文件格式不正确");
    } finally {
      fileInput.value = "";
    }
  });

  selectDate(selectedKey);
</script>
</body>
</html>
