<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pastel Calendar Notes</title>
<style>
  :root {
    --bg: #eef6fb;
    --panel: #f8fcff;
    --panel-2: #e3f0f7;
    --blue: #9fc8df;
    --blue-dark: #5f8da8;
    --text: #344957;
    --muted: #7d96a6;
    --accent: #b9dff0;
    --accent-2: #d7edf7;
    --white: #ffffff;
    --shadow: rgba(95, 141, 168, 0.18);
    --danger: #d99a9a;
    --soft-danger: #f5dddd;
    --success: #8eb79c;
    --soft-success: #e5f3ea;
    --warning: #c99b5b;
    --soft-warning: #fff0d6;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    background:
      radial-gradient(circle at 15% 15%, #ffffff 0, transparent 26%),
      radial-gradient(circle at 85% 10%, #dceff8 0, transparent 24%),
      linear-gradient(135deg, #eef6fb, #f8fbff);
    color: var(--text);
  }

  .app {
    width: min(1220px, calc(100vw - 32px));
    min-height: calc(100vh - 32px);
    margin: 16px auto;
    display: grid;
    grid-template-columns: 1.05fr 0.95fr;
    gap: 18px;
  }

  .panel {
    background: rgba(248, 252, 255, 0.86);
    border: 1px solid rgba(159, 200, 223, 0.42);
    border-radius: 28px;
    box-shadow: 0 18px 45px var(--shadow);
    backdrop-filter: blur(12px);
    padding: 22px;
  }

  .left {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .title-wrap h1 {
    margin: 0;
    font-size: 25px;
    letter-spacing: 0.04em;
    color: var(--blue-dark);
  }

  .subtitle {
    margin-top: 5px;
    color: var(--muted);
    font-size: 13px;
  }

  .nav,
  .button-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  button {
    border: 0;
    border-radius: 999px;
    background: var(--accent-2);
    color: var(--blue-dark);
    padding: 9px 13px;
    cursor: pointer;
    font-weight: 700;
    box-shadow: inset 0 0 0 1px rgba(95, 141, 168, 0.12);
    transition: transform 0.15s ease, background 0.15s ease;
  }

  button:hover {
    transform: translateY(-1px);
    background: var(--accent);
  }

  .month-title {
    margin: 0;
    padding: 12px 16px;
    background: var(--panel-2);
    color: var(--blue-dark);
    border-radius: 18px;
    text-align: center;
    font-size: 20px;
  }

  .weekdays,
  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }

  .weekday {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 2px 0;
  }

  .day {
    min-height: 82px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.78);
    border: 1px solid rgba(159, 200, 223, 0.38);
    padding: 9px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s ease, border 0.15s ease, background 0.15s ease;
  }

  .day:hover {
    transform: translateY(-2px);
    border-color: rgba(95, 141, 168, 0.52);
    background: #ffffff;
  }

  .empty {
    opacity: 0.35;
    cursor: default;
  }

  .day.selected {
    background: #e0f2fb;
    border-color: var(--blue-dark);
  }

  .day.today::after {
    content: "today";
    position: absolute;
    right: 8px;
    top: 8px;
    font-size: 10px;
    color: var(--blue-dark);
    background: #ffffffa8;
    padding: 2px 6px;
    border-radius: 999px;
  }

  .date {
    font-size: 14px;
    font-weight: 800;
    color: var(--blue-dark);
  }

  .note-preview {
    margin-top: 7px;
    font-size: 12px;
    line-height: 1.35;
    color: var(--muted);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    white-space: pre-wrap;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--blue-dark);
    position: absolute;
    left: 10px;
    bottom: 10px;
    opacity: 0.72;
  }

  .task-count {
    position: absolute;
    right: 8px;
    bottom: 8px;
    min-width: 20px;
    height: 20px;
    border-radius: 999px;
    background: var(--soft-warning);
    color: var(--warning);
    font-size: 11px;
    font-weight: 800;
    display: grid;
    place-items: center;
    padding: 0 6px;
  }

  .right {
    display: grid;
    grid-template-rows: auto minmax(260px, 1fr) auto minmax(230px, 0.78fr) auto;
    gap: 14px;
    min-height: calc(100vh - 76px);
  }

  .editor-header,
  .tasks-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .selected-date,
  .section-title {
    margin: 0;
    font-size: 24px;
    color: var(--blue-dark);
  }

  .section-title {
    font-size: 20px;
  }

  .hint {
    margin-top: 6px;
    color: var(--muted);
    font-size: 13px;
  }

  textarea,
  input[type="text"],
  input[type="date"] {
    border: 1px solid rgba(159, 200, 223, 0.55);
    background: rgba(255, 255, 255, 0.7);
    color: var(--text);
    outline: none;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.55);
  }

  textarea:focus,
  input[type="text"]:focus,
  input[type="date"]:focus {
    border-color: var(--blue-dark);
    background: #ffffff;
  }

  textarea {
    width: 100%;
    height: 100%;
    min-height: 250px;
    border-radius: 22px;
    padding: 18px;
    font-size: 15px;
    line-height: 1.75;
    resize: none;
  }

  .task-form {
    display: grid;
    grid-template-columns: minmax(120px, 1fr) 150px auto;
    gap: 8px;
    align-items: center;
    background: rgba(227, 240, 247, 0.62);
    border: 1px solid rgba(159, 200, 223, 0.35);
    border-radius: 20px;
    padding: 10px;
  }

  .task-form input {
    width: 100%;
    border-radius: 999px;
    padding: 10px 12px;
    font-family: inherit;
  }

  .task-list {
    overflow: auto;
    display: flex;
    flex-direction: column;
    gap: 9px;
    padding-right: 2px;
  }

  .task-item {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    gap: 10px;
    align-items: center;
    background: rgba(255,255,255,0.72);
    border: 1px solid rgba(159, 200, 223, 0.35);
    border-radius: 18px;
    padding: 10px;
  }

  .task-item.done {
    opacity: 0.58;
  }

  .task-item.done .task-title {
    text-decoration: line-through;
  }

  .task-checkbox {
    width: 18px;
    height: 18px;
    accent-color: var(--blue-dark);
    cursor: pointer;
  }

  .task-main {
    min-width: 0;
  }

  .task-title {
    font-weight: 800;
    word-break: break-word;
  }

  .task-date {
    margin-top: 3px;
    color: var(--muted);
    font-size: 12px;
  }

  .badge {
    white-space: nowrap;
    border-radius: 999px;
    padding: 5px 9px;
    font-size: 12px;
    font-weight: 800;
    background: var(--accent-2);
    color: var(--blue-dark);
  }

  .badge.today-badge {
    background: var(--soft-warning);
    color: var(--warning);
  }

  .badge.overdue-badge {
    background: var(--soft-danger);
    color: #945f5f;
  }

  .badge.done-badge {
    background: var(--soft-success);
    color: var(--success);
  }

  .mini-btn {
    padding: 7px 10px;
    font-size: 12px;
  }

  .tools {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .status {
    color: var(--muted);
    font-size: 13px;
  }

  .danger {
    color: #945f5f;
    background: var(--soft-danger);
  }

  .danger:hover {
    background: #edc7c7;
  }

  .empty-tasks {
    color: var(--muted);
    text-align: center;
    padding: 24px;
    border: 1px dashed rgba(159, 200, 223, 0.72);
    border-radius: 18px;
    background: rgba(255,255,255,0.38);
  }

  @media (max-width: 900px) {
    .app {
      grid-template-columns: 1fr;
    }

    .right {
      min-height: auto;
      grid-template-rows: auto 320px auto minmax(240px, auto) auto;
    }
  }

  @media (max-width: 560px) {
    .app {
      width: min(100vw - 18px, 1220px);
      margin: 9px auto;
    }

    .panel {
      padding: 16px;
      border-radius: 22px;
    }

    .header,
    .editor-header,
    .tasks-header {
      flex-direction: column;
    }

    .day {
      min-height: 68px;
      border-radius: 14px;
      padding: 7px;
    }

    .note-preview {
      display: none;
    }

    .task-form {
      grid-template-columns: 1fr;
    }

    .task-item {
      grid-template-columns: auto 1fr;
    }

    .task-item .badge,
    .task-item .delete-task-btn {
      grid-column: 2;
      justify-self: start;
    }
  }
</style>
</head>
<body>
  <main class="app">
    <section class="panel left">
      <div class="header">
        <div class="title-wrap">
          <h1>Calendar Notes</h1>
          <div class="subtitle">低饱和蓝白小日历 · 点击日期编辑右侧备忘</div>
        </div>
        <div class="nav">
          <button id="prevBtn">←</button>
          <button id="todayBtn">今天</button>
          <button id="nextBtn">→</button>
        </div>
      </div>

      <h2 class="month-title" id="monthTitle"></h2>
      <div class="weekdays" id="weekdays"></div>
      <div class="calendar" id="calendar"></div>
    </section>

    <section class="panel right">
      <div class="editor-header">
        <div>
          <h2 class="selected-date" id="selectedDateTitle"></h2>
          <div class="hint">内容会自动保存在当前浏览器里。</div>
        </div>
      </div>

      <textarea id="noteEditor" placeholder="今天要记什么呢？"></textarea>

      <div class="tasks-header">
        <div>
          <h2 class="section-title">Task List</h2>
          <div class="hint">未完成任务会自动显示倒计时，完成后会排到后面。</div>
        </div>
      </div>

      <section class="task-list-wrap">
        <form class="task-form" id="taskForm">
          <input id="taskTitleInput" type="text" placeholder="任务名，比如：上传网页 / 画草稿" />
          <input id="taskDateInput" type="date" />
          <button type="submit">添加</button>
        </form>
        <div class="task-list" id="taskList"></div>
      </section>

      <div class="tools">
        <span class="status" id="saveStatus">已准备好</span>
        <div class="button-row">
          <button id="exportBtn">导出 JSON</button>
          <button id="importBtn">导入 JSON</button>
          <button class="danger" id="clearBtn">清空当天</button>
        </div>
      </div>
      <input type="file" id="fileInput" accept="application/json" hidden />
    </section>
  </main>

<script>
  const NOTE_PREFIX = "pastel-calendar-note-";
  const TASKS_KEY = "pastel-calendar-tasks";

  const monthTitle = document.getElementById("monthTitle");
  const weekdays = document.getElementById("weekdays");
  const calendar = document.getElementById("calendar");
  const selectedDateTitle = document.getElementById("selectedDateTitle");
  const noteEditor = document.getElementById("noteEditor");
  const saveStatus = document.getElementById("saveStatus");
  const fileInput = document.getElementById("fileInput");
  const taskForm = document.getElementById("taskForm");
  const taskTitleInput = document.getElementById("taskTitleInput");
  const taskDateInput = document.getElementById("taskDateInput");
  const taskList = document.getElementById("taskList");

  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const todayBtn = document.getElementById("todayBtn");
  const clearBtn = document.getElementById("clearBtn");
  const exportBtn = document.getElementById("exportBtn");
  const importBtn = document.getElementById("importBtn");

  const weekNames = ["日", "一", "二", "三", "四", "五", "六"];
  const now = new Date();
  let current = new Date(now.getFullYear(), now.getMonth(), 1);
  let selectedKey = makeDateKey(now.getFullYear(), now.getMonth(), now.getDate());
  let saveTimer = null;

  weekNames.forEach(name => {
    const div = document.createElement("div");
    div.className = "weekday";
    div.textContent = name;
    weekdays.appendChild(div);
  });

  function makeDateKey(year, month, day) {
    return `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
  }

  function parseDateKey(key) {
    const [year, month, day] = key.split("-").map(Number);
    return { year, month: month - 1, day };
  }

  function dateFromKey(key) {
    const { year, month, day } = parseDateKey(key);
    return new Date(year, month, day);
  }

  function todayKey() {
    const today = new Date();
    return makeDateKey(today.getFullYear(), today.getMonth(), today.getDate());
  }

  function getNoteStorageKey(dateKey) {
    return NOTE_PREFIX + dateKey;
  }

  function getNote(dateKey) {
    return localStorage.getItem(getNoteStorageKey(dateKey)) || "";
  }

  function setNote(dateKey, text) {
    if (text.trim()) {
      localStorage.setItem(getNoteStorageKey(dateKey), text);
    } else {
      localStorage.removeItem(getNoteStorageKey(dateKey));
    }
  }

  function getTasks() {
    try {
      return JSON.parse(localStorage.getItem(TASKS_KEY) || "[]");
    } catch (error) {
      return [];
    }
  }

  function setTasks(tasks) {
    localStorage.setItem(TASKS_KEY, JSON.stringify(tasks));
  }

  function formatDateZh(key) {
    const { year, month, day } = parseDateKey(key);
    const date = new Date(year, month, day);
    const week = weekNames[date.getDay()];
    return `${year} 年 ${month + 1} 月 ${day} 日 · 星期${week}`;
  }

  function escapeHtml(text) {
    return text.replace(/[&<>"']/g, char => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[char]));
  }

  function tasksByDate(dateKey) {
    return getTasks().filter(task => task.due === dateKey && !task.done);
  }

  function taskTitlesPreview(dateKey) {
    return tasksByDate(dateKey)
      .map(task => task.title)
      .filter(Boolean)
      .join("；");
  }

  function renderCalendar() {
    calendar.innerHTML = "";

    const year = current.getFullYear();
    const month = current.getMonth();
    const firstDay = new Date(year, month, 1).getDay();
    const totalDays = new Date(year, month + 1, 0).getDate();
    const today = todayKey();

    monthTitle.textContent = `${year} 年 ${month + 1} 月`;

    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement("div");
      empty.className = "day empty";
      calendar.appendChild(empty);
    }

    for (let day = 1; day <= totalDays; day++) {
      const key = makeDateKey(year, month, day);
      const note = getNote(key);
      const taskPreview = taskTitlesPreview(key);
      const taskCount = tasksByDate(key).length;
      const div = document.createElement("div");
      div.className = "day";
      if (key === today) div.classList.add("today");
      if (key === selectedKey) div.classList.add("selected");

      div.innerHTML = `
        <div class="date">${day}</div>
        <div class="note-preview">${taskPreview ? escapeHtml(taskPreview) : (note ? escapeHtml(note) : "")}</div>
        ${(note || taskPreview) ? '<div class="dot"></div>' : ''}
        ${taskCount > 1 ? `<div class="task-count">${taskCount}</div>` : ''}
      `;

      div.addEventListener("click", () => selectDate(key));
      calendar.appendChild(div);
    }
  }

  function selectDate(key) {
    saveCurrentNote();
    selectedKey = key;
    selectedDateTitle.textContent = formatDateZh(key);
    noteEditor.value = getNote(key);
    taskDateInput.value = key;
    saveStatus.textContent = "已切换日期";
    renderAll();
  }

  function saveCurrentNote() {
    setNote(selectedKey, noteEditor.value);
    saveStatus.textContent = "已自动保存";
    renderCalendar();
  }

  function getDayDiff(dueKey) {
    const today = dateFromKey(todayKey());
    const due = dateFromKey(dueKey);
    return Math.round((due - today) / 86400000);
  }

  function getBadgeHtml(task) {
    if (task.done) return '<span class="badge done-badge">已完成</span>';

    const diff = getDayDiff(task.due);
    if (diff < 0) return `<span class="badge overdue-badge">逾期 ${Math.abs(diff)} 天</span>`;
    if (diff === 0) return '<span class="badge today-badge">今天截止</span>';
    return `<span class="badge">还有 ${diff} 天</span>`;
  }

  function ensureTaskIds(tasks) {
    let changed = false;
    const normalized = tasks.map(task => {
      if (task.id) return task;
      changed = true;
      return {
        ...task,
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random())
      };
    });
    if (changed) setTasks(normalized);
    return normalized;
  }

  function renderTasks() {
    const tasks = ensureTaskIds(getTasks()).slice().sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      return a.due.localeCompare(b.due);
    });

    taskList.innerHTML = "";

    if (!tasks.length) {
      taskList.innerHTML = '<div class="empty-tasks">还没有任务。给未来的自己塞一张小纸条吧。</div>';
      return;
    }

    tasks.forEach(task => {
      const item = document.createElement("div");
      item.className = `task-item ${task.done ? "done" : ""}`;
      item.innerHTML = `
        <input class="task-checkbox" type="checkbox" ${task.done ? "checked" : ""} aria-label="切换完成状态" />
        <div class="task-main">
          <div class="task-title">${escapeHtml(task.title)}</div>
          <div class="task-date">截止：${formatDateZh(task.due)}</div>
        </div>
        ${getBadgeHtml(task)}
        <button class="mini-btn danger delete-task-btn" type="button">删除</button>
      `;

      item.querySelector(".task-checkbox").addEventListener("change", event => {
        toggleTask(task.id, event.target.checked);
      });

      item.querySelector(".delete-task-btn").addEventListener("click", event => {
        event.preventDefault();
        event.stopPropagation();
        deleteTask(task.id);
      });

      taskList.appendChild(item);
    });
  }

  function renderAll() {
    renderCalendar();
    renderTasks();
  }

  function addTask(title, due) {
    const tasks = getTasks();
    tasks.push({
      id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
      title,
      due,
      done: false,
      createdAt: new Date().toISOString()
    });
    setTasks(tasks);
    saveStatus.textContent = "已添加任务";
    renderAll();
  }

  function toggleTask(id, done) {
    const tasks = getTasks().map(task => task.id === id ? { ...task, done } : task);
    setTasks(tasks);
    saveStatus.textContent = done ? "任务已完成" : "任务已恢复";
    renderAll();
  }

  function deleteTask(id) {
    const tasks = ensureTaskIds(getTasks()).filter(task => task.id !== id);
    setTasks(tasks);
    saveStatus.textContent = "任务已删除";
    renderAll();
  }

  noteEditor.addEventListener("input", () => {
    saveStatus.textContent = "正在输入……";
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveCurrentNote, 350);
  });

  taskForm.addEventListener("submit", event => {
    event.preventDefault();
    const title = taskTitleInput.value.trim();
    const due = taskDateInput.value || selectedKey;
    if (!title) {
      saveStatus.textContent = "先写任务名喔";
      taskTitleInput.focus();
      return;
    }
    addTask(title, due);
    taskTitleInput.value = "";
    taskTitleInput.focus();
  });

  prevBtn.addEventListener("click", () => {
    saveCurrentNote();
    current.setMonth(current.getMonth() - 1);
    renderAll();
  });

  nextBtn.addEventListener("click", () => {
    saveCurrentNote();
    current.setMonth(current.getMonth() + 1);
    renderAll();
  });

  todayBtn.addEventListener("click", () => {
    saveCurrentNote();
    const today = new Date();
    current = new Date(today.getFullYear(), today.getMonth(), 1);
    selectDate(makeDateKey(today.getFullYear(), today.getMonth(), today.getDate()));
  });

  clearBtn.addEventListener("click", () => {
    noteEditor.value = "";
    saveCurrentNote();
    saveStatus.textContent = "当天备忘已清空";
  });

  exportBtn.addEventListener("click", () => {
    saveCurrentNote();
    const notes = {};
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith(NOTE_PREFIX)) {
        notes[key.replace(NOTE_PREFIX, "")] = localStorage.getItem(key);
      }
    }

    const data = {
      version: 2,
      exportedAt: new Date().toISOString(),
      notes,
      tasks: getTasks()
    };

    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "calendar-notes-backup.json";
    a.click();
    URL.revokeObjectURL(url);
    saveStatus.textContent = "已导出备份";
  });

  importBtn.addEventListener("click", () => fileInput.click());

  fileInput.addEventListener("change", async () => {
    const file = fileInput.files[0];
    if (!file) return;

    try {
      const text = await file.text();
      const data = JSON.parse(text);

      if (data.version === 2 && data.notes) {
        Object.entries(data.notes).forEach(([dateKey, value]) => {
          if (/^\d{4}-\d{2}-\d{2}$/.test(dateKey)) {
            setNote(dateKey, String(value));
          }
        });
        if (Array.isArray(data.tasks)) {
          setTasks(data.tasks);
        }
      } else {
        Object.entries(data).forEach(([dateKey, value]) => {
          if (/^\d{4}-\d{2}-\d{2}$/.test(dateKey)) {
            setNote(dateKey, String(value));
          }
        });
      }

      selectDate(selectedKey);
      saveStatus.textContent = "导入成功";
    } catch (error) {
      alert("导入失败：文件格式不正确");
    } finally {
      fileInput.value = "";
    }
  });

  selectDate(selectedKey);
</script>
</body>
</html>
